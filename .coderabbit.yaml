# CodeRabbit configuration
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

reviews:
  # Branches that trigger an automatic review when a PR targets them
  base_branches:
    - main
    - dev
    - "feature/**"
    - "bug/**"
    - "refactor/**"
    - "hotfix/**"
    - "docs/**"
    - "chore/**"

  # Review profile: chill = concise, assertive = thorough
  profile: chill

  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

language: en-US
