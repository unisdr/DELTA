name: P0 Bug Triage Audit

on:
  workflow_dispatch:
    inputs:
      model:
        description: "GitHub Models model ID — copy the exact string from the model's API snippet on github.com/marketplace/models"
        default: "openai/gpt-5"
        required: false
        type: string
      dry_run:
        description: "Dry run — assemble and print the prompt but do not call the AI API"
        default: false
        required: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  triage:
    name: Run P0 Codebase Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ── Pass 1: Static analysis ──────────────────────────────────────────────

      - name: Run TypeScript compiler
        id: tsc
        run: |
          mkdir -p tmp
          yarn tsc --noEmit 2>&1 | tee tmp/tsc-output.txt || true
          echo "tsc_lines=$(wc -l < tmp/tsc-output.txt)" >> "$GITHUB_OUTPUT"
        env:
          NODE_ENV: test

      - name: Run ESLint
        id: lint
        run: |
          mkdir -p tmp
          # ESLint may not be configured yet (P0-3 adds it as part of Phase 0).
          # Skip gracefully rather than failing the audit workflow.
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)" 2>/dev/null; then
            yarn lint --format json > tmp/lint-output.json 2>&1 || true
            yarn lint --format compact > tmp/lint-summary.txt 2>&1 || true
            echo "lint_errors=$(jq '[.[].errorCount] | add // 0' tmp/lint-output.json)" >> "$GITHUB_OUTPUT"
          else
            echo "NOTE: yarn lint is not configured (P0-3 pending — ESLint not yet set up)." \
              > tmp/lint-summary.txt
            echo "lint_errors=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run anti-pattern grep
        run: |
          mkdir -p tmp

          echo "=== AP-01: Possible missing await on Drizzle queries ===" > tmp/patterns-output.txt
          grep -rn --include="*.ts" --include="*.tsx" \
            -E "^\s+[a-z]+\.(select|insert|update|delete)\(" \
            app/ | grep -v "^\s*await\|^\s*return" >> tmp/patterns-output.txt 2>/dev/null || true

          echo "" >> tmp/patterns-output.txt
          echo "=== AP-02: dr.* used inside tx scope ===" >> tmp/patterns-output.txt
          grep -rn --include="*.ts" -E "\bdr\.(select|insert|update|delete|query)\(" \
            app/backend.server/ >> tmp/patterns-output.txt 2>/dev/null || true

          echo "" >> tmp/patterns-output.txt
          echo "=== AP-04: console.* instrumentation ===" >> tmp/patterns-output.txt
          grep -rn --include="*.ts" --include="*.tsx" \
            -E "console\.(log|error|warn|info|debug)" \
            app/ | head -50 >> tmp/patterns-output.txt 2>/dev/null || true
          TOTAL=$(grep -rn --include="*.ts" --include="*.tsx" \
            -E "console\.(log|error|warn|info|debug)" app/ | wc -l)
          echo "(Total console.* calls: $TOTAL — showing first 50)" >> tmp/patterns-output.txt

          echo "" >> tmp/patterns-output.txt
          echo "=== AP-07: Non-awaited existence checks ===" >> tmp/patterns-output.txt
          grep -rn --include="*.ts" \
            -E "const \w+ = (tx|dr)\.(select|query)" \
            app/backend.server/models/ >> tmp/patterns-output.txt 2>/dev/null || true

          echo "" >> tmp/patterns-output.txt
          echo "=== AP-09: Potential secrets in logs ===" >> tmp/patterns-output.txt
          grep -rn --include="*.ts" \
            -E "console\.(log|info|warn).*[Ss][Ee][Cc][Rr][Ee][Tt]|console\.(log|info|warn).*DATABASE_URL|console\.(log|info|warn).*PASSWORD" \
            app/ >> tmp/patterns-output.txt 2>/dev/null || true

          echo "" >> tmp/patterns-output.txt
          echo "=== AP-10: TLS verification disabled ===" >> tmp/patterns-output.txt
          grep -rn --include="*.ts" \
            "rejectUnauthorized" \
            app/ >> tmp/patterns-output.txt 2>/dev/null || true

      # ── Pass 2: Per-item analysis with dynamic file discovery ────────────────

      - name: Process P0 items — per-item API calls
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_API_KEY || secrets.GITHUB_TOKEN }}
          MODEL:        ${{ github.event.inputs.model || vars.BUG_TRIAGE_MODEL || 'openai/gpt-5' }}
          DRY_RUN:      ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 - << 'PYEOF'
          import os, re, json, subprocess, time, urllib.request, urllib.error

          model   = os.environ["MODEL"]
          token   = os.environ["MODELS_TOKEN"]
          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"

          # ── Parse p0-items.md ───────────────────────────────────────────────

          def parse_items_and_notes(filepath):
              with open(filepath, encoding="utf-8") as f:
                  content = f.read()
              items = []
              in_table = False
              for line in content.split('\n'):
                  if '| ID |' in line or '|----' in line:
                      in_table = True
                      continue
                  if in_table and line.startswith('| P0-'):
                      cols = [c.strip() for c in line.split('|')[1:-1]]
                      if len(cols) >= 3:
                          items.append({
                              'id':     cols[0],
                              'title':  cols[1],
                              'status': cols[2].strip('`'),
                          })
                  elif in_table and line.strip() and not line.startswith('|'):
                      in_table = False
              notes = {}
              current_id = None
              current_lines = []
              for line in content.split('\n'):
                  m = re.match(r'^#### (P0-\d+)', line)
                  if m:
                      if current_id:
                          notes[current_id] = '\n'.join(current_lines).strip()
                      current_id = m.group(1)
                      current_lines = []
                  elif current_id:
                      current_lines.append(line)
              if current_id:
                  notes[current_id] = '\n'.join(current_lines).strip()
              return items, notes

          # ── Dynamic file discovery ──────────────────────────────────────────

          def find_relevant_files(title, max_files=3):
              quoted      = re.findall(r'`([^`]+)`', title)
              # Filenames mentioned without backticks (e.g. "env.ts", "build_binary.sh")
              filenames   = re.findall(r'\b[\w\-\.]+\.(?:ts|tsx|sh|md|yml|json)\b', title)
              # camelCase / PascalCase identifiers
              identifiers = re.findall(r'\b[a-z][a-zA-Z0-9]{3,}\b|\b[A-Z][a-zA-Z0-9]{3,}\b', title)
              # ALLCAPS_WITH_UNDERSCORES env vars (e.g. NODE_ENV)
              allcaps     = re.findall(r'\b[A-Z][A-Z0-9_]{2,}\b', title)
              stop_words  = {
                  'remove', 'guard', 'example', 'routes', 'production', 'with', 'from',
                  'that', 'this', 'node', 'dead', 'fix', 'add', 'create', 'delete',
                  'missing', 'silent', 'error', 'wrong', 'sets', 'file', 'files',
                  'type', 'export', 'bugs', 'column', 'header', 'errors', 'factual',
                  'replace', 'correct', 'copyright', 'placeholder',
              }
              identifiers = [i for i in identifiers if i.lower() not in stop_words]
              keywords = list(dict.fromkeys(quoted + filenames + allcaps + identifiers))[:10]
              if not keywords:
                  return []
              query = "|".join(re.escape(k) for k in keywords)
              search_paths = []
              for d in ["app/", "scripts/", "tests/"]:
                  if os.path.isdir(d):
                      search_paths.append(d)
              for f in ["Dockerfile.app", "vitest.config.ts", "readme.md", "LICENSE"]:
                  if os.path.exists(f):
                      search_paths.append(f)
              if not search_paths:
                  return []
              try:
                  result = subprocess.run(
                      ["grep", "-rln", "--include=*.ts", "--include=*.tsx",
                       "--include=*.sh", "--include=Dockerfile*",
                       "-E", query] + search_paths,
                      capture_output=True, text=True, timeout=20
                  )
                  files = [l.strip() for l in result.stdout.splitlines() if l.strip()]
                  scored = []
                  for fp in files:
                      r2 = subprocess.run(
                          ["grep", "-c", "-E", query, fp],
                          capture_output=True, text=True
                      )
                      count = int(r2.stdout.strip()) if r2.stdout.strip().isdigit() else 0
                      scored.append((count, fp))
                  scored.sort(reverse=True)
                  return [fp for _, fp in scored[:max_files]]
              except Exception as e:
                  print(f"  grep error: {e}")
                  return []

          def read_excerpt(filepath, max_lines=70):
              if not os.path.exists(filepath):
                  return f"--- {filepath} --- NOT FOUND"
              with open(filepath, encoding="utf-8", errors="replace") as f:
                  lines = f.readlines()
              content = "".join(lines[:max_lines])
              suffix = f"\n... ({len(lines)-max_lines} more lines)" if len(lines) > max_lines else ""
              return f"--- FILE: {filepath} ({len(lines)} lines) ---\n{content}{suffix}"

          # ── Prompt constants ────────────────────────────────────────────────

          system_prompt = (
              "You are a codebase analyst for the DELTA Resilience project — a multi-tenant, "
              "multi-language government disaster tracking system built on TypeScript, React Router v7, "
              "Drizzle ORM, and PostgreSQL + PostGIS.\n\n"
              "Your role is to produce structured, accurate analysis only.\n"
              "- Do NOT generate fix code.\n"
              "- Do NOT suggest refactors beyond what is needed to describe the minimal fix.\n"
              "- Every claim must be traceable to a specific file and line number.\n"
              "- If you cannot find evidence for a claim, say so explicitly rather than guessing.\n\n"
              "Multi-tenancy rule: all user data is scoped to countryAccountsId. Any query on a "
              "tenant-scoped table without countryAccountsId in the WHERE clause is a potential "
              "cross-tenant data leak.\n\n"
              "Transaction rule: Drizzle's primary DB instance is 'dr'. Inside transaction callbacks, "
              "always use the 'tx' parameter. Using 'dr' inside a transaction bypasses the transaction."
          )

          output_schema = "\n".join([
              "```yaml",
              "- id: P0-NN",
              "  title: \"Short description\"",
              "  file: app/path/to/file.ts",
              "  line: 47",
              "  root_cause: >",
              "    Precise explanation. One to four sentences.",
              "  fix_complexity: Trivial | Simple | Complex",
              "  requires_spec: true | false",
              "  requires_test: true | false",
              "  fix_summary: \"One sentence describing the minimal fix.\"",
              "  antipattern: AP-NN | none",
              "```",
          ])

          # ── Main loop ───────────────────────────────────────────────────────

          items, notes = parse_items_and_notes("specs/source-code-audits/p0-items.md")
          os.makedirs("gap-analysis/bug-triage", exist_ok=True)

          results = {}
          skipped = []

          for item in items:
              item_id = item['id']
              title   = item['title']
              status  = item['status']

              if status == 'done':
                  skipped.append(item_id)
                  print(f"Skipping {item_id} — already done")
                  continue

              print(f"\nProcessing {item_id}: {title}")

              relevant_files = find_relevant_files(title)
              print(f"  Files found: {relevant_files or 'none'}")

              file_sections = [read_excerpt(fp) for fp in relevant_files]
              source_context = (
                  "\n\n".join(file_sections) if file_sections
                  else "[No source files matched — creation task or identifiers not found in codebase]"
              )

              item_notes = notes.get(item_id, "")

              parts = [
                  f"Analyse single P0 item: {item_id}",
                  "",
                  f"ID: {item_id}",
                  f"Title: {title}",
              ]
              if item_notes:
                  parts += [
                      "",
                      "Intent notes (authoritative — take precedence over code inference):",
                      item_notes,
                  ]
              parts += [
                  "",
                  "--- RELEVANT SOURCE FILES ---",
                  source_context,
                  "",
                  "--- TASK ---",
                  "Produce ONE YAML entry for this item using the schema below.",
                  "Do not generate fix code. Trace every claim to a file and line number.",
                  "If no source evidence is available, state that explicitly.",
                  "",
                  "--- OUTPUT SCHEMA ---",
                  output_schema,
                  "",
                  "Output ONLY the YAML entry — no preamble, no trailing commentary.",
              ]
              user_message = "\n".join(parts)

              token_est = (len(system_prompt) + len(user_message)) // 4
              print(f"  Prompt: ~{token_est} tokens")

              if dry_run:
                  print(f"  DRY RUN — skipping API call")
                  with open(f"gap-analysis/bug-triage/{item_id}.md", "w") as f:
                      f.write(f"# {item_id}: {title}\n\n> DRY RUN — no API call made\n")
                  results[item_id] = True
                  continue

              payload = json.dumps({
                  "model": model,
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_message},
                  ],
                  "max_tokens": 600,
                  "temperature": 0,
              }).encode("utf-8")

              req = urllib.request.Request(
                  "https://models.github.ai/inference/chat/completions",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {token}",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      api_result = json.loads(resp.read())
                  yaml_content = api_result["choices"][0]["message"]["content"]
                  out_path = f"gap-analysis/bug-triage/{item_id}.md"
                  with open(out_path, "w", encoding="utf-8") as f:
                      f.write(f"# {item_id}: {title}\n\n{yaml_content}\n")
                  results[item_id] = True
                  print(f"  Written: {out_path}")

              except urllib.error.HTTPError as e:
                  err_body = e.read().decode()
                  print(f"  API error {e.code} for {item_id}: {err_body[:200]}")
                  with open(f"gap-analysis/bug-triage/{item_id}.md", "w") as f:
                      f.write(f"# {item_id}: {title}\n\n> **ERROR:** API call failed ({e.code}). Manual triage required.\n")
                  results[item_id] = False

              time.sleep(5)

          # ── Generate INDEX.md ───────────────────────────────────────────────

          index_rows = []
          for item in items:
              item_id = item['id']
              if item['status'] == 'done':
                  index_rows.append(f"| [{item_id}]({item_id}.md) | {item['title']} | — | `done` |")
                  continue
              complexity = "pending"
              fp = f"gap-analysis/bug-triage/{item_id}.md"
              if os.path.exists(fp):
                  with open(fp, encoding="utf-8") as f:
                      fc = f.read()
                  m = re.search(r'fix_complexity:\s*(\w+)', fc)
                  if m:
                      complexity = m.group(1)
                  if results.get(item_id) is False:
                      complexity = "ERROR"
              index_rows.append(
                  f"| [{item_id}]({item_id}.md) | {item['title']} | {complexity} | `{item['status']}` |"
              )

          success = sum(1 for v in results.values() if v)
          failed  = sum(1 for v in results.values() if not v)

          index_lines = [
              "# P0 Bug Triage — Index",
              "",
              f"> Generated by [Bug Triage Agent](.github/agents/bug-triage.agent.md) · Model: {model}",
              ">",
              "> **Gate 1:** Review all findings and sign off before Phase 0 sprint work begins.",
              f"> Analysed: {success} · Errors: {failed} · Skipped (done): {len(skipped)}",
              "",
              "| ID | Title | Complexity | Status |",
              "|----|-------|------------|--------|",
          ] + index_rows + [
              "",
              "---",
              "",
              "## Gate 1 Checklist",
              "",
              "- [ ] Review all findings in this folder",
              "- [ ] Verify root cause for **P0-2** (`deleteById` missing await)",
              "- [ ] Verify root cause for **P0-8** (`revokeUserApiAccess` side effect)",
              "- [ ] Verify root cause for **P0-12** (secrets in startup logs)",
              "- [ ] Confirm all complexity ratings are accurate",
              "- [ ] All 28 P0 items are present and have a `fix_complexity` value",
          ]

          with open("gap-analysis/bug-triage/INDEX.md", "w", encoding="utf-8") as f:
              f.write("\n".join(index_lines) + "\n")

          print(f"\nINDEX.md written. {success} analysed, {failed} errors, {len(skipped)} skipped.")
          PYEOF

      # ── Create a PR for Gate 1 review ─────────────────────────────────────────

      - name: Create Pull Request for Gate 1 review
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          MODEL_USED: ${{ github.event.inputs.model || vars.BUG_TRIAGE_MODEL || 'openai/gpt-5' }}
        run: |
          BRANCH="pre-phase-0/bug-triage-$(date +%Y%m%d-%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add gap-analysis/bug-triage/
          git rm --ignore-unmatch gap-analysis/bug-triage/.gitkeep
          printf 'Pre-Phase 0: Bug Triage Audit — Gate 1 review required\n\nGenerated by the P0 Bug Triage Audit workflow.\nModel: %s\n\nEach P0 item has a dedicated analysis file in gap-analysis/bug-triage/.\nReview INDEX.md for the summary, then verify P0-2, P0-8, P0-12 in detail.' \
            "$MODEL_USED" > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push origin "$BRANCH"
          printf '## Gate 1 — Pre-Phase 0 Bug Triage\n\nThis PR contains the output of the automated P0 codebase audit.\nEach item has a dedicated analysis file. Start with `gap-analysis/bug-triage/INDEX.md`.\n\n**Before merging this PR:**\n- [ ] Review `INDEX.md` for the full complexity summary\n- [ ] Verify root cause for **P0-2** (`deleteById` missing await)\n- [ ] Verify root cause for **P0-8** (`revokeUserApiAccess` side effect)\n- [ ] Verify root cause for **P0-12** (secrets in startup logs)\n- [ ] Confirm all complexity ratings are accurate\n- [ ] All 28 P0 items are present and have a `fix_complexity` value' \
            > /tmp/pr-body.md
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "Pre-Phase 0: Bug Triage Audit (Gate 1)" \
            --body-file /tmp/pr-body.md
