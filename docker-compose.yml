services:
  app:
    container_name: delta-local-app
    image: delta/local-app
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SESSION_SECRET=${SESSION_SECRET}
      - EMAIL_TRANSPORT=file
      - AUTHENTICATION_SUPPORTED=form
      - PUBLIC_URL=${PUBLIC_URL}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - .:/delta
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    container_name: delta-local-db
    image: postgis/postgis:17-3.5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    container_name: delta-local-adminer
    image: adminer
    depends_on:
      - db
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_DB_DRIVER: pgsql
      ADMINER_DEFAULT_DB_HOST: db
      ADMINER_DEFAULT_DB_PORT: 5432
      ADMINER_DEFAULT_DB_NAME: ${POSTGRES_DB}
    restart: on-failure

volumes:
  db-data:
    driver: local
