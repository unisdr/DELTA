schema: spec-driven

context: |
  Project: DELTA Resilience — Disaster & Hazardous Events, Losses and Damages Tracking & Analysis.
  Built for UNDRR. Multi-tenant, multi-language national disaster tracking with geospatial features.

  Tech stack: TypeScript (strict mode), React Router v7 (Remix-style SSR), Express 5,
  Drizzle ORM, PostgreSQL 16/17 + PostGIS. Package manager: yarn.

  Architecture layers:
  - app/routes/$lang+/        — React Router route modules (file-based, language-prefixed URLs)
  - app/backend.server/       — Server-only code (never bundled to client)
    - models/                 — DB access layer; one file per table
    - handlers/               — Shared request handlers (form, CSV, API)
    - services/               — Business logic (access management, organisations)
  - app/frontend/             — Shared frontend components and form definitions
  - app/drizzle/schema/       — Drizzle table definitions and type exports
  - app/utils/                — Shared utilities (auth, session, email, security)

  Key conventions:
  - Multi-tenancy: ALL queries must be scoped with countryAccountsId. Never fetch across tenants.
  - Auth: wrap every loader with authLoaderWithPerm, every action with authActionWithPerm.
    Never use authLoaderApiDocs — it skips tenant checks (known bug P1-22).
  - Form-CSV-API pattern: fieldsDef drives forms, CSV import/export, and REST API simultaneously.
    Never remove fieldsDef from a model even when replacing formScreen() with PrimeReact JSX.
  - DB migrations: yarn dbsync ONLY (drizzle-kit migrate). NEVER drizzle-kit push.
    When adding a column, also update tests/integration/db/testSchema/ until P1-42 is resolved.
  - Server-only files: use .server.ts(x) suffix. Path alias ~/* maps to app/*.
  - Translation: ctx.t({ code: "key", msg: "Fallback" }). Run yarn i18n:extractor after adding strings.
  - New env vars: add to example.env with a comment.
  - Branches from dev, PRs target dev. Commit prefixes: Bug:, Feature:, Refactor:, Docs:.
  - Style: Prettier (tabs, 80-char width, trailing commas). Run yarn format before committing.

  Testing infrastructure:
  - yarn test:run2  — Vitest + PGlite integration tests (no external DB needed). PRIMARY test suite.
  - yarn test:run3  — Vitest integration tests against real PostgreSQL (needs .env.test).
  - yarn test:e2e   — Playwright end-to-end tests (expects PORT=4000).
  - yarn vitest run path/to/test.ts  — Run a single test file.
  - DO NOT use node:test. app/backend.server/models/*_test.ts files are orphaned — do not extend them.
  - New tests go under tests/ using Vitest. PGlite setup: tests/integration/db/setup.ts.
  - createTestBackendContext() constructs test contexts. See tests/integration/db/ for patterns.
  - Test file naming: always *.test.ts (e.g. common.test.ts) — never *_test.ts.
  - Setup import path: `import "./setup"` for files directly in tests/integration/db/;
    `import "../setup"` for files one level deeper (e.g. tests/integration/db/queries/).

  Critical anti-patterns: see .github/skills/anti-pattern-check.md — never reproduce any item listed there.

rules:
  proposal:
    - Scope to a single coherent concern. If the change touches unrelated files, split it.
    - List every file expected to change with a one-line reason.
    - State explicitly whether a DB migration is required.
    - State the test approach: PGlite (test:run2) or real DB (test:run3) or E2E.
    - If the change affects auth or multi-tenancy, call it out as a security-sensitive change.

  specs:
    - Use Given/When/Then format with RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
    - Reference the exact model function or route handler being specified.
    - Include both the happy path and the failure/error path as separate scenarios.
    - Do not specify implementation details — specify observable behaviour only.

  design:
    - Name every TypeScript type or interface that will be added or changed.
    - If Drizzle schema changes are needed, describe the column additions explicitly.
    - Identify whether tests use PGlite or require a real DB, and why.
    - Note any impact on the Form-CSV-API fieldsDef pipeline.

  tasks:
    - TDD order is mandatory: write the failing Vitest test first, then implement, then refactor.
    - Each task must be independently runnable (yarn vitest run path/to/test.ts).
    - Test files use *.test.ts naming — never *_test.ts.
    - If a DB migration is involved, yarn dbsync is a task — never drizzle-kit push.
    - The refactor section MUST include all 7 quality gates as explicit tasks in this order:
        1. yarn vitest run <test-file>          — tests still green after refactor
        2. yarn tsc                             — zero TypeScript errors
        3. yarn format:check                   — Prettier clean (run yarn format to fix)
        4. Anti-pattern review                 — check .github/skills/anti-pattern-check.md
        5. SOLID review                        — invoke solid-reviewer agent
        6. Documentation review               — comments explain WHY not WHAT; balance rule applies
        7. Project conventions review         — check .github/copilot-instructions.md
    - Final task after all 7 gates pass: run opsx:archive on the same branch before raising the PR.
